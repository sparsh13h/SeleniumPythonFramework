name: 🤖 AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-code-review:
    name: AI Code Reviewer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          separator: "\n"

      - name: Run AI Code Review
        uses: actions/github-script@v7
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const changedFiles = process.env.CHANGED_FILES.split('\n').filter(Boolean);

            // Get the diff for the PR
            const { data: diff } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              mediaType: { format: 'diff' }
            });

            // Post a structured review comment
            const reviewBody = `## 🤖 AI Code Review Started

            **Copilot is reviewing your changes...**

            📁 **Files changed:** ${changedFiles.length}
            \`\`\`
            ${changedFiles.slice(0, 20).join('\n')}${changedFiles.length > 20 ? `\n... and ${changedFiles.length - 20} more` : ''}
            \`\`\`

            > 💡 **Tip:** Ask Copilot to review specific files by commenting:
            > \`@copilot review src/yourfile.ts for security issues\`

            ---
            *Powered by [AI Code Reviewer Skill](.github/copilot-instructions.md)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reviewBody
            });

      - name: Security scan (basic)
        run: |
          echo "🔍 Scanning for common security issues..."

          FOUND_ISSUES=0

          # Check for hardcoded secrets patterns
          if git diff origin/${{ github.base_ref }}...HEAD -- . | grep -E '(api_key|apikey|secret|password|token)\s*=\s*["'"'"'][^$\{]' --include="*.ts" --include="*.js" --include="*.py" -i; then
            echo "::warning::Possible hardcoded secret detected in diff"
            FOUND_ISSUES=$((FOUND_ISSUES + 1))
          fi

          # Check for console.log in production files (not tests)
          if git diff origin/${{ github.base_ref }}...HEAD -- 'src/**' | grep '^\+.*console\.log'; then
            echo "::warning::console.log found in source files (use a proper logger)"
            FOUND_ISSUES=$((FOUND_ISSUES + 1))
          fi

          # Check for empty catch blocks
          if git diff origin/${{ github.base_ref }}...HEAD -- . | grep -A1 'catch.*{' | grep -E '^\s*}'; then
            echo "::warning::Possible empty catch block detected"
            FOUND_ISSUES=$((FOUND_ISSUES + 1))
          fi

          if [ $FOUND_ISSUES -eq 0 ]; then
            echo "✅ No obvious security issues found"
          else
            echo "⚠️ Found $FOUND_ISSUES potential issue(s) — see warnings above"
          fi

      - name: Post review checklist
        uses: actions/github-script@v7
        if: github.event.action == 'opened'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checklist = `## 📋 PR Review Checklist

            _Auto-generated by AI Code Reviewer. Check off items as you review._

            ### Author Checklist (before requesting review)
            - [ ] I tested this locally
            - [ ] I added/updated unit tests
            - [ ] No hardcoded secrets or credentials
            - [ ] Console.logs removed from production code
            - [ ] Updated documentation if behavior changed

            ### Reviewer Checklist
            - [ ] 🐛 Logic is correct and edge cases handled
            - [ ] 🔒 No security vulnerabilities introduced
            - [ ] ⚡ No obvious performance regressions
            - [ ] 🧪 Tests are meaningful (not just coverage padding)
            - [ ] 📖 Code is readable without needing explanation

            ---
            > Ask Copilot for help: \`@copilot what does this PR do?\` or \`@copilot are there any bugs in this diff?\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: checklist
            });
